# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Profile focus (this workspace): Front End Developer — React/TypeScript, accessibility, performance-minded UI.
# AI companies stay in the list when they ship web/product UX; titles must still hit frontend positives below.
# Boards marked enabled:false are mostly ML/research/hardware — turn back on if you intentionally target them.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   ✅ https://careers.mastercard.com   ⚠️ https://mastercard.wd1.myworkdayjobs.com (fallback only)
#   ✅ https://openai.com/careers       ⚠️ https://job-boards.greenhouse.io/openai (fallback only)
#   Exception: ATS-hosted careers_url is acceptable when no branded careers page exists.
#   Using raw ATS URLs when a branded page exists can cause false 410 errors (job ID mismatch).
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # Primary web/UI delivery signals (scan.mjs + generate-input-jds.mjs — substring match, case-insensitive).
    # AI is intentionally NOT a lone positive — combine via employers + complementary search_queries instead.
    - "Front End"
    - "Frontend"
    - "Front-End"
    - "React"
    - "TypeScript"
    - "JavaScript"
    - "Accessibility"
    - "A11y"
    - "WCAG"
    - "Design System"
    - "Design Systems"
    - "UI Engineer"
    - "UX Engineer"
    - "Web Engineer"
    - "Web Developer"
    - "Client Engineer"
    - "Full Stack"
    - "Developer Experience"
    - "Design Technologist"
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    - "Junior"
    - "Intern"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    # Backend / infra / QA — avoids noise when positives include Full Stack or Web Developer
    - "Backend Engineer"
    - "Back-End Engineer"
    - "Platform Engineer"
    - "Infrastructure Engineer"
    - "DevOps Engineer"
    - "Site Reliability"
    - "SRE"
    - "Data Engineer"
    - "Security Engineer"
    - "QA Engineer"
    - "Hardware"
    - "Robotics"
    # Pure ML / research / consulting-led tracks (AI product FE roles rarely use these title shapes)
    - "Machine Learning"
    - "ML Engineer"
    - "MLOps"
    - "Research Scientist"
    - "Research Staff"
    - "Data Scientist"
    - "Computer Vision"
    - "AI Engineer"
    - "Solutions Architect"
    - "Forward Deployed"
    - "Pre-Sales"
    - "Presales"
    - "React Native"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Search queries --
# Used when scan runs WebSearch discovery (see modes/scan.md). Node scan.mjs uses tracked_companies APIs + title_filter only.

search_queries:
  # Frontend / accessibility — UK & Europe remote bias (matches cv.md + profile)
  - name: Ashby — Frontend / React / TypeScript
    query: 'site:jobs.ashbyhq.com ("Frontend" OR "Front End" OR "React" OR "TypeScript") ("remote" OR "UK" OR "United Kingdom" OR "Europe" OR "EMEA")'
    enabled: true

  - name: Greenhouse — Frontend / React / Accessibility
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io ("Frontend" OR "Front End" OR "React" OR "Accessibility" OR "A11y") ("remote" OR "UK" OR "Europe")'
    enabled: true

  - name: Lever — Frontend / UI Engineer
    query: 'site:jobs.lever.co ("Frontend" OR "React" OR "UI Engineer") ("remote" OR "UK" OR "Europe")'
    enabled: true

  - name: Remotive — Frontend Europe
    query: 'site:remotive.com ("frontend" OR "react" OR "typescript") ("Europe" OR "UK" OR "remote")'
    enabled: true

  - name: WeWorkRemotely — Frontend / React
    query: 'site:weworkremotely.com ("frontend" OR "react" OR "javascript engineer") remote'
    enabled: true

  - name: RemoteOK — React / TypeScript
    query: 'site:remoteok.com ("react" OR "typescript" OR "frontend engineer") remote'
    enabled: true

  - name: EU Remote Jobs — Frontend
    query: 'site:euremotejobs.com ("frontend" OR "react" OR "typescript") remote Europe'
    enabled: true

  - name: Working Nomads — Frontend
    query: 'site:workingnomads.com ("frontend developer" OR "react developer" OR "javascript developer") remote'
    enabled: true

  - name: HN Who's Hiring — Frontend / React Remote
    query: 'site:news.ycombinator.com ("React" OR "frontend" OR "TypeScript") (remote OR Remote)'
    enabled: true

  # Frontend building AI products (title often lists React/Frontend first; complements ML-only discovery noise)
  - name: Ashby — Frontend / React + AI product surface
    query: 'site:jobs.ashbyhq.com ("Frontend" OR "Front End" OR "React") ("GenAI" OR "LLM" OR "Copilot" OR "Assistant") ("remote" OR "UK" OR "Europe")'
    enabled: true

  - name: Greenhouse — Frontend + AI-native SaaS
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io ("Frontend" OR "React" OR "UI Engineer") ("AI" OR "LLM") ("remote" OR "UK" OR "Europe")'
    enabled: true

  - name: Cross-portal — React / Next.js AI tooling (UK/Europe remote)
    query: '("React" OR "Next.js" OR "TypeScript") ("AI SDK" OR "Copilot" OR "LLM UI" OR "chat UX") ("remote" OR "UK" OR "Europe") site:jobs.ashbyhq.com OR site:job-boards.greenhouse.io OR site:jobs.lever.co'
    enabled: true

